name: work-link

services:
  postgres:
    image: postgres
    container_name: work-link-postgres
    environment:
      POSTGRES_DB: work-link
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - work-link_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  work-link_postgres_data:

